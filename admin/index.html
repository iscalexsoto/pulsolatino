<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulso Latino CMS</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function () {
      var version = Date.now();
      var renderersScript = document.createElement("script");
      renderersScript.src = "/js/renderers.js?v=" + version;
      renderersScript.onload = function () {
        var previewScript = document.createElement("script");
        previewScript.src = "/admin/preview.js?v=" + version;
        document.body.appendChild(previewScript);
      };
      document.body.appendChild(renderersScript);
    })();
  </script>
</body>
</html>
