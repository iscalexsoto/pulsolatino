backend:
  name: github
  repo: iscalexsoto/pulsolatino
  branch: main
  base_url: https://decap-cms-oauth.iscalexsoto.workers.dev

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://www.pulsolatinoestudio.com
display_url: https://www.pulsolatinoestudio.com

locale: "es"

collections:
  - name: "icons"
    label: "Biblioteca de iconos"
    preview: false
    files:
      - label: "Iconos"
        name: "icons"
        file: "content/icons.json"
        format: "json"
        fields:
          - label: "Iconos"
            name: "icons"
            widget: "list"
            summary: "{{fields.id}} · {{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Slug unico. Ej: social-facebook" }
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Archivo SVG", name: "svg", widget: "image", required: false, hint: "Sube un SVG para este icono" }

  - name: "site"
    label: "Sitio"
    preview: true
    files:
      - label: "Contenido general"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "Telefono WhatsApp internacional", name: "whatsappPhone", widget: "string" }
          - { label: "Mensaje WhatsApp por defecto", name: "whatsappDefaultMessage", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Titulo linea 1", name: "headlinePrefix", widget: "string" }
              - { label: "Titulo destacado", name: "headlineHighlight", widget: "string" }
              - { label: "Subtitulo", name: "subheadline", widget: "text" }
              - { label: "Boton principal texto", name: "primaryCtaLabel", widget: "string" }
              - { label: "Mensaje de WhatsApp del boton principal (opcional)", name: "primaryCtaMessage", widget: "text", required: false }
              - { label: "Boton secundario texto", name: "secondaryCtaLabel", widget: "string" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Texto ubicacion", name: "locationText", widget: "string" }
              - { label: "Texto WhatsApp", name: "whatsappText", widget: "string" }
              - { label: "Copyright", name: "copyrightText", widget: "string" }
              - label: "Redes"
                name: "socials"
                widget: "list"
                required: false
                fields:
                  - { label: "ID de icono", name: "iconId", widget: "string", hint: "ID definido en la colección Biblioteca de iconos" }
                  - { label: "Icono legacy (Font Awesome)", name: "icon", widget: "string", required: false }
                  - { label: "Texto", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
          - label: "Boton WhatsApp flotante"
            name: "floatingWhatsapp"
            widget: "object"
            fields:
              - { label: "Texto", name: "label", widget: "string" }
              - { label: "Mensaje de WhatsApp (opcional)", name: "message", widget: "text", required: false }

  - name: "schedules"
    label: "Horarios"
    preview: true
    files:
      - label: "Datos de horarios"
        name: "schedules"
        file: "content/schedules.json"
        format: "json"
        fields:
          - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
          - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
          - label: "Sucursales"
            name: "branches"
            widget: "list"
            fields:
              - { label: "ID sucursal", name: "id", widget: "string" }
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "ID de icono", name: "iconId", widget: "string", hint: "ID definido en la colección Biblioteca de iconos" }
              - { label: "Icono legacy (Font Awesome)", name: "icon", widget: "string", required: false }
              - { label: "Texto boton CTA", name: "ctaLabel", widget: "string" }
              - { label: "Mensaje de WhatsApp del CTA (opcional)", name: "ctaMessage", widget: "text", required: false }
              - label: "Bloques por dias"
                name: "dayGroups"
                widget: "list"
                fields:
                  - { label: "Titulo de bloque", name: "dayTitle", widget: "string" }
                  - label: "Clases"
                    name: "classes"
                    widget: "list"
                    fields:
                      - { label: "Hora", name: "time", widget: "string" }
                      - { label: "Estilo (salsa/bachata/cumbia/cardio)", name: "style", widget: "string" }
                      - { label: "Nombre clase", name: "name", widget: "string" }
                      - { label: "Area (opcional)", name: "area", widget: "string", required: false }

  - name: "prices"
    label: "Precios"
    preview: true
    files:
      - label: "Datos de precios"
        name: "prices"
        file: "content/prices.json"
        format: "json"
        fields:
          - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
          - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
          - { label: "Texto boton CTA", name: "ctaLabel", widget: "string" }
          - { label: "Mensaje de WhatsApp del CTA (opcional)", name: "ctaMessage", widget: "text", required: false }
          - { label: "Texto promocion (HTML permitido)", name: "promoHtml", widget: "text" }
          - label: "Secciones de precios"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Titulo", name: "title", widget: "string" }
              - label: "Paquetes"
                name: "packages"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Nombre", name: "name", widget: "string" }
                  - { label: "Descripcion", name: "description", widget: "string" }
                  - { label: "Monto", name: "amount", widget: "string" }
                  - { label: "Sufijo (ej. /mes)", name: "suffix", widget: "string" }
                  - { label: "Icono (SVG)", name: "iconImage", widget: "image", allow_multiple: false, media_folder: "assets/icons", public_folder: "/assets/icons" }
                  - { label: "Icono legacy (Font Awesome)", name: "icon", widget: "string", required: false }
                  - { label: "Destacado", name: "featured", widget: "boolean", default: false, required: false }
                  - { label: "Badge (opcional)", name: "badge", widget: "string", required: false }
          - { label: "Nota inferior", name: "finePrint", widget: "text" }

  - name: "events"
    label: "Eventos y flyers"
    preview: true
    files:
      - label: "Galeria de eventos"
        name: "events"
        file: "content/events.json"
        format: "json"
        fields:
          - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
          - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Imagen", name: "image", widget: "image" }
              - { label: "Texto alternativo", name: "alt", widget: "string" }

  - name: "about"
    label: "Nosotros"
    preview: true
    files:
      - label: "Contenido de Nosotros"
        name: "about"
        file: "content/nosotros.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Titulo", name: "title", widget: "string" }
          - label: "Quienes somos"
            name: "about"
            widget: "object"
            fields:
              - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
              - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
              - label: "Parrafos"
                name: "paragraphs"
                widget: "list"
                field: { label: "Parrafo", name: "paragraph", widget: "text" }
              - { label: "Frase destacada", name: "quote", widget: "string" }
          - label: "Director"
            name: "director"
            widget: "object"
            fields:
              - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
              - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Biografia", name: "bio", widget: "text" }
              - { label: "Imagen", name: "image", widget: "image" }
              - { label: "Texto alternativo de imagen", name: "imageAlt", widget: "string" }
          - label: "Historia"
            name: "history"
            widget: "object"
            fields:
              - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
              - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
              - label: "Items de historia"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Titulo", name: "title", widget: "string" }
                  - { label: "Descripcion", name: "description", widget: "text" }
                  - label: "Bullets (opcional)"
                    name: "bullets"
                    widget: "list"
                    required: false
                    field: { label: "Bullet", name: "bullet", widget: "string" }
          - label: "Valores"
            name: "values"
            widget: "object"
            fields:
              - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
              - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nombre", name: "name", widget: "string" }
                  - { label: "Descripcion", name: "description", widget: "text" }
                  - { label: "Ancho completo", name: "wide", widget: "boolean", default: false, required: false }
          - label: "Mision y Vision"
            name: "missionVision"
            widget: "object"
            fields:
              - { label: "Etiqueta de seccion", name: "sectionLabel", widget: "string" }
              - { label: "Titulo de seccion", name: "sectionTitle", widget: "string" }
              - { label: "Titulo mision", name: "missionTitle", widget: "string" }
              - { label: "Texto mision", name: "missionText", widget: "text" }
              - { label: "Titulo vision", name: "visionTitle", widget: "string" }
              - { label: "Texto vision", name: "visionText", widget: "text" }
          - label: "CTA final"
            name: "finalCta"
            widget: "object"
            fields:
              - { label: "Titulo", name: "title", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }
              - { label: "Texto del boton", name: "buttonLabel", widget: "string" }
              - { label: "URL del boton", name: "buttonHref", widget: "string" }
